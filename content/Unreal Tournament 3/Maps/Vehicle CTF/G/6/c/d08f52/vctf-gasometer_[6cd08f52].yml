description: "An old industrial complex in the middle of the mountains of Canmore.\
  \ Including a large gas tank made with brick stones, - the Gasometer. In real life\
  \ the 1896 constructed Gasometer was part of a gas-storage-tank area located in\
  \ Vienna, Austria. It contains today an entertainment center and apartments."
