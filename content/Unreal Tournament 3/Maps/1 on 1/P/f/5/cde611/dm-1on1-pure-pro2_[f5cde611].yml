description: "In 2279 The Liandri Mining Corperation acquired several defensive satellites\
  \ from Pure Research Corp. Liandri has spent the past two and a half decades refurbishing\
  \ these abandoned installations for Tournament use. This facility is one such satellite\
  \ located in orbit around the planet Paradime, commissioned to defend the high concentration\
  \ of Tridium found in its massive rings."
