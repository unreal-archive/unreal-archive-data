- name: "Sentinel Deployer"
  description: "The Sentinel Deployer is capable of quickly fabricating one of the\
    \ preset Sentinel types when supplied with enough standard components. It can\
    \ also be used to repair existing Sentinels and upgrade their capabilities. When\
    \ you no longer need to control an area, components can be recovered from existing\
    \ Sentinels by \\\"recycling\\\" them.\\n\\nWhile the advanced security features\
    \ possessed by each Sentinel allow direct interaction only from the Deployer that\
    \ created it, it is possible both to repair other Sentinels marked as allied,\
    \ and sabotage those that are not."
