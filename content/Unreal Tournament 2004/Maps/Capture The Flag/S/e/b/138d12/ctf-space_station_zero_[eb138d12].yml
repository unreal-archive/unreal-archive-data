description: "Space Station Z.E.R.O. has been floated in space for a long time. A\
  \ perfect place to construct the blue Heal Crystals. These Heal Crystals also should\
  \ not be touched... however its hard to simply go and touch it! It has also a lot\
  \ power of gravity. If this place were in Earth... all building, people, evrything\
  \ will float and might even be shot in space! So please, dont broke this plase down\
  \ to Earth."
