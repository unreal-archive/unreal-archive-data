author: "Bradley (Nutter) Jones"
description: "With the worlds over all temperature now declining due to new methods\
  \ of removing green house gases from the atmosphere and better methods of industry,\
  \ along with deep space expeditions keeping large stocks of water, the Earths ocean\
  \ levels began to fall dramatically. Somewhere deep in the Pacific ocean lies this\
  \ spire that rose when the water around it fell, revealing not only the towering\
  \ rock itself, but also these ancient watch towers on top of it. A bit like Atlantis,\
  \ with some mysterious force preserving it, and powering the crystals within.||nutter@kilkenny.ath.cx||www.third-helix.com"
