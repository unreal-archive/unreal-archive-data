name: "DM-GodComplex"
author: "Roy Mingelers & Lars Kerff"
description: "Once there lived a wizard good of heart. His castle filled with joy\
  \ and laughter. Till one day he claimed god's throne for himself and drove his people\
  \ into agony. Thousands of sacrifices were made to fulfill his lust for power. After\
  \ sixty six years of terror his reign ended. With all his might he could not cheat\
  \ death. At a failed attempt to stop his aging, time itself collapsed... Now, fifteen\
  \ centuries later the source of the wizard's power still remains behind castle walls.\
  \   The Liandri Corporation utilized this power for the UDamage amplifier used in\
  \ tournaments. Some followers continue to worship him and believe in his resurrection.\
  \ When the clock stops ticking god's wrath shall be unleashed upon us, or so they\
  \ say..."
