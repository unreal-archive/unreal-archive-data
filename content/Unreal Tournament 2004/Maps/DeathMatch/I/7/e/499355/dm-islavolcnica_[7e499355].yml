author: "Alejandro Vitulich"
description: "Las escasas tierras de este extraño planeta gaseoso surgen rara vez\
  \ a la superficie en forma de columnas que se abren paso entre las densas capas\
  \ de gas para formar a veces estos singulares volcanes. Este será un inhóspito escenario\
  \ de una isla volcánica que no tiene costa, solo un gas mortal súper presurizado\
  \ que rechaza todo lo que cae en él, y en algunos casos (si caes) las corrientes\
  \ gaseosas te absorberán hacia el centro del volcán para expulsarte con una presió\
  n de 150 Toneladas por metro cuadrado."
