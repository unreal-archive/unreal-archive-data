description: "Near the middle of the Tokara Forest, where the trees are oldest and\
  \ have grown the highest, some explorers discovered this strange \\\"Nest\\\". One\
  \ of the explorers secretly worked for the Liandri Corp. and informed them of the\
  \ find before anyone could contact some archaeologists. Liandri recognized the value\
  \ of the dense net of catwalks with the most amazing fall to death just below. Thus\
  \ the Tokara Trees Arena was born."
