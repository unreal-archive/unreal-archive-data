author: "Fred Blair"
description: "All your favorite friends want to frag today. Everyone's meeting at\
  \ the Fabulous Palace Frag House. Mac and the boys would have approved. Sit back,\
  \ suck down some  Old  Tennis Shoes and frag for the good old times. Have a bubble\
  \ bath, have a pillow fight, dance in the grand hall, frag some friends! Name taken\
  \ from the Palace Flop House in Steinbeck's Cannery Row. Check it out, it's a good\
  \ read!"
