description: "These Mayan ruins were recently discovered in a hidden glade somewhere\
  \ in South America.||After excavating these ruins, it was obvious that they held\
  \ no great worth, and no one could determine why the people died in such a place,\
  \ all they could find were a few scorch marks, so the excavtion was aborted.||Since\
  \ then it has grown over, but the mystery as to what caused their deaths remains.||All\
  \ that is certain is that this is the perfect setting for a 'Predator'...||All we\
  \ need now is Arnold Swartzanegger and some mud..."
