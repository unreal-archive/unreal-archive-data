description: "In the year 2235, Earth was destroyed. Cities were blown away, burned\
  \ by the nuclear fire of the third world war.  After the great fire, gangs started\
  \ to take control of the new world. Pirates, punks, skinheads... a dangerous gang\
  \ warfare. A long time before the war, Nimeria was once a beautiful city...now,\
  \ it is a toxic cemetery. Various gangs are fighting in the center of this city\
  \ to get their hands on the black gold : petrol. Author Samuel De Cruz"
