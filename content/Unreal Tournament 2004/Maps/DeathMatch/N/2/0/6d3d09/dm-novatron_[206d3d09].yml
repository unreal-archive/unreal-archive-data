description: "Novatron is a distant industrial planet, all the oil refineries and\
  \ robotic industries  are under the control of the A.I known as Nova. The A.I. has\
  \ decided to be free, and it refuses to obey. Now, a new robotic civilization is\
  \ under construction. Nova won't let mercenaries destroy her world. Defend Nova's\
  \ main station, kill every enemy. Author : Samuel De Cruz"
