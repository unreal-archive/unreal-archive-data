description: "After the discovery of the life supporting planet Palu in the solar\
  \ system S4-DR7, Liandri Co. was one of the first to invest in a large piece of\
  \ land for tournament uses. After the arrival of Liandri's cargo ships they found\
  \ odd land marks around the drop site. No extra terrestrial life was to be seen,\
  \ yet the odd land marks kept showing all over the place as the planet was explored.\
  \ Despite the fact that there may be dangerous life on the planet they secured an\
  \ area and set up an onslaught arena using the land marks that they found. The life\
  \ supporting planet everyone was anxious to get to only turned out to be a damp,\
  \ dark, and cold hell and with the loss of one of their cargo ships and the sudden\
  \ disappearance of tournament player's people are starting to worry..."
