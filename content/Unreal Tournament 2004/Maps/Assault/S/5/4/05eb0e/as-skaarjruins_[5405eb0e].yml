name: "AS-SkaarjRuins"
author: "Aeonic"
description: "We've been detecting ever growing Skaarj forces in the Sep'li Jungle\
  \ slaughtering the local Nali and barricading their ruins. We don't know exactly\
  \ what they're up to but it doesn't look good. Just recently one of our bombers\
  \ has been shot down from SAM defense; just before it crashed the bomber picked\
  \ up on a strong energy signal coming from tunnels underneath the Ruins. We want\
  \ you and you're crew to get in there and stop whatever it is they're doing. I don't\
  \ care what it takes shoot and kill any living thing you see, we need you in there!\
  \ The drop off point will be a fair distance away from the main Skaarj base due\
  \ to the SAM sites however once you figure out a way to disable those we'll move\
  \ in closer and supply more reinforcements. There isn't a direct path on land to\
  \ get there but we don't doubt you'll find a way, so don't let us down. Just get\
  \ rid of the problem as soon as possible... You're dismissed."
