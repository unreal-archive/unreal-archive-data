description: "This scenario, recreates the destruction of a Skaarj war ship. The massive\
  \ war ship was headed for Earth, carrying hundreds of Skaarj soldiers and weapons.\
  \ The S.S.P.'s alpha team planned to destroy the war ship before it reached Earth.\
  \ The ship's outer hull was made of an extremily powerful alloy, which was indestructable\
  \ by any weapon. the Alpha teams only option, was to destroy the ships wing stabalizers,\
  \ making the war ship unable to control."
