name: "CTF-Alcatron"
author: "Francis_MrBee_Briau"
description: "This takes place on Alcatron, a planet at the far end of the Andromed\
  \ galaxy. This planet has a very heliptical orbit and, every 4 weeks, the gravity\
  \ drops to almost nothing! The Andromese from Oreda have chosen this planet as a\
  \ base for CTF matches and every year, it's CTF-Alcatron time !   8 weeks contest\
  \ of the greatest team warriors from this galaxie breaks the cold silence of Alcatron\
  \ that becomes the host of a game of death. Registration for the contest is on Alphatron-5,\
  \ it's closest moon. Resgistrated participants teams will be lodging on Alphatron-3\
  \ and then will be beamdown to Alcatron. Only the greatest warriors will make it.\
  \ Be advised !"
